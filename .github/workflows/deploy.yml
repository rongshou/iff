name: Deploy Self-hosted (no setup-node)

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js via NodeSource
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node --version
          npm --version

      - name: npm ci (root)
        run: npm ci

      - name: npm ci (tianshu)
        run: cd tianshu && npm ci

      - name: build
        env:
          BASE_URL: /iff/tianquan/
          VITE_API_BASE: https://iz2ze93ogksv8bwaz3pk8hz.taildec4f9.ts.net/api
          VITE_APP_VERSION: v0.14.local
        run: npm run build

      - name: Trigger self-hosted server webhook
        if: success()
        run: |
          curl -s -X POST "http://47.93.149.29/webhook/tianshu?token=${{ secrets.WEBHOOK_SECRET }}" --max-time 120