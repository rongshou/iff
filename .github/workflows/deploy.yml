name: Deploy to GitHub Pages + Self-hosted

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version from git
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          echo "VITE_APP_VERSION=v0.12.$COUNT+$SHA" >> $GITHUB_OUTPUT

      - run: npm ci
      - run: cd tianshu && npm ci
      - run: npm run build
        env:
          BASE_URL: /iff/tianquan/
          VITE_API_BASE: https://iz2ze93ogksv8bwaz3pk8hz.taildec4f9.ts.net/api
          VITE_APP_VERSION: ${{ steps.version.outputs.VITE_APP_VERSION }}

      - name: Trigger self-hosted server webhook
        run: |
          curl -s -X POST "http://47.93.149.29/webhook/tianshu?token=${{ secrets.WEBHOOK_SECRET }}" --max-time 120
