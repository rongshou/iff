name: Trigger self-hosted deploy

on:
  push:
    branches: [master]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Ping self-hosted webhook
        run: |
          curl -s -X POST \
            "http://47.93.149.29/webhook/tianshu?token=*** secrets.WEBHOOK_SECRET }}" \
            --max-time 300
          echo "[webhook] triggered"