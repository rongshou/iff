name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Build tianquan (root React app)
        run: |
          VERSION=$(cat tianshu/VERSION 2>/dev/null || echo "v0.0")
          echo "version: $VERSION"
          npx tsc -b
          VITE_APP_VERSION="$VERSION" npx vite build
          # Move React app to dist/tianquan/
          mkdir -p dist/tianquan
          for f in dist/*; do
            fname=$(basename "$f")
            [ "$fname" = "tianquan" ] && continue
            [ "$fname" = "tianshu" ] && continue
            mv "$f" "dist/tianquan/"
          done
          # SPA fallback (404.html = index.html for client-side routing)
          cp dist/tianquan/index.html dist/tianquan/404.html
          # Landing page
          cp landing/index.html dist/index.html
          cp dist/index.html dist/404.html
        env:
          # GitHub Pages serves from /iff/tianquan/ (build output moves to dist/tianquan/)
          BASE_URL: /iff/tianquan/
          # Backend API base (Tailscale Funnel) — used by school.ts, api.ts, chat.ts
          VITE_API_BASE: https://iz2ze93ogksv8bwaz3pk8hz.taildec4f9.ts.net/api

      - name: Install tianshu dependencies
        run: |
          cd tianshu
          npm ci

      - name: Build tianshu (Vite React app)
        run: |
          cd tianshu
          npx tsc -b
          npx vite build --base /iff/tianshu/
          cd ..
          mkdir -p dist/tianshu
          cp -r tianshu/dist/* dist/tianshu/
          # Copy legacy backup (old Streamlit version)
          mkdir -p dist/tianshu/legacy
          cp tianshu/legacy/* dist/tianshu/legacy/ 2>/dev/null || true
          touch dist/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger self-hosted webhook
        if: success()
        run: |
          curl -sS -k --max-time 300 -X POST \
            "https://iffirm.com/webhook/tianshu?token=${{ secrets.WEBHOOK_TOKEN }}" \
            -o /tmp/webhook-out.txt -w "http_code=%{http_code}\n"
          if [ -s /tmp/webhook-out.txt ]; then
            echo "==== webhook output ===="
            tail -30 /tmp/webhook-out.txt
          fi
