name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build tianquan (root React app)
        run: |
          VERSION=$(cat tianshu/VERSION 2>/dev/null || echo "v0.0")
          echo "version: $VERSION"
          npx tsc -b
          VITE_APP_VERSION="$VERSION" npx vite build
          # Move React app to dist/tianquan/
          mkdir -p dist/tianquan
          for f in dist/*; do
            fname=$(basename "$f")
            [ "$fname" = "tianquan" ] && continue
            [ "$fname" = "tianshu" ] && continue
            mv "$f" "dist/tianquan/"
          done
          # SPA fallback (404.html = index.html for client-side routing)
          cp dist/tianquan/index.html dist/tianquan/404.html
          # Landing page
          cp landing/index.html dist/index.html
          cp dist/index.html dist/404.html
        env:
          # GitHub Pages serves from /iff/tianquan/ (build output moves to dist/tianquan/)
          BASE_URL: /iff/tianquan/

      - name: Copy tianshu (standalone HTML/JS app)
        run: |
          mkdir -p dist/tianshu
          # Core app files (latest v2 美化 version from tianshu/ root)
          cp tianshu/index.html dist/tianshu/
          cp tianshu/app.js dist/tianshu/
          cp tianshu/bazi.js dist/tianshu/
          cp tianshu/beidou.js dist/tianshu/
          cp tianshu/data.js dist/tianshu/
          cp tianshu/engine.js dist/tianshu/
          cp tianshu/version.js dist/tianshu/
          # New test pages (MBTI + Holland self-test)
          cp tianshu/holland-test.html dist/tianshu/ 2>/dev/null || true
          cp tianshu/holland-test.js dist/tianshu/ 2>/dev/null || true
          cp tianshu/mbti-test.html dist/tianshu/ 2>/dev/null || true
          cp tianshu/mbti-test.js dist/tianshu/ 2>/dev/null || true
          # Legacy backup (old version)
          mkdir -p dist/tianshu/legacy
          cp tianshu/legacy/* dist/tianshu/legacy/ 2>/dev/null || true
          # .nojekyll for GitHub Pages
          touch dist/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
