# 开发模式: 不使用 Docker, 本地直接运行
services:
  backend:
    build: ./backend
    ports:
      - "3470:3470"
    volumes:
      - ./backend/app:/app/app:ro
      - backend_data:/app/data
    environment:
      - TIANQUAN_DB_PATH=/app/data/advisor.db

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend_data:
