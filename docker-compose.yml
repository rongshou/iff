services:
  backend:
    build: ./backend
    container_name: tianquan-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3470:3470"
    volumes:
      - /home/admin/.openclaw/workspace-study-abroad/study-abroad-advisor/data:/app/data:ro
    environment:
      - TIANQUAN_DB_PATH=/app/data/advisor.db
      - TIANQUAN_DATA_DIR=/app/data
      - TIANQUAN_HOST=0.0.0.0
      - TIANQUAN_PORT=3470
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3470/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: tianquan-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
