<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFF · 留学智能平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #141b2d 50%, #1a1f35 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #e8edf5;
  padding: 24px;
}

.container {
  max-width: 840px;
  width: 100%;
  text-align: center;
}

h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #f0f4ff;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 15px;
  color: #8896b6;
  margin-bottom: 48px;
  letter-spacing: 0.02em;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  position: relative;
  border-radius: 20px;
  padding: 40px 32px;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 280px;
  transition: transform 0.25s ease, box-shadow 0.3s ease;
  cursor: pointer;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;
  padding: 1px;
  background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.card:hover {
  transform: translateY(-4px);
}

.card-tianquan {
  background: linear-gradient(145deg, #1a2d4a, #0f1e36);
}

.card-tianquan:hover {
  box-shadow: 0 12px 40px rgba(59, 130, 246, 0.25);
}

.card-tianshu {
  background: linear-gradient(145deg, #2a1a3a, #1a0f2e);
}

.card-tianshu:hover {
  box-shadow: 0 12px 40px rgba(168, 85, 247, 0.25);
}

.card-icon {
  font-size: 48px;
  margin-bottom: 20px;
  line-height: 1;
}

.card-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 0.03em;
}

.card-subtitle {
  font-size: 14px;
  color: #8896b6;
  line-height: 1.6;
  max-width: 260px;
  text-align: center;
}

.card-badge {
  display: inline-block;
  margin-top: 20px;
  padding: 6px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.card-tianquan .card-badge {
  background: rgba(59, 130, 246, 0.15);
  color: #93bbfc;
}

.card-tianshu .card-badge {
  background: rgba(168, 85, 247, 0.15);
  color: #c4a0f7;
}

@media (max-width: 640px) {
  body { padding: 16px; align-items: flex-start; padding-top: 40px; }
  .grid { grid-template-columns: 1fr; gap: 16px; }
  h1 { font-size: 22px; }
  .subtitle { margin-bottom: 32px; }
  .card { min-height: 220px; padding: 28px 20px; }
  .card-title { font-size: 20px; }
  .card-icon { font-size: 36px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>IFF · 留学智能平台</h1>
  <p class="subtitle">选择工具开始使用</p>

  <div class="grid">
    <a class="card card-tianquan" href="tianquan/">
      <div class="card-icon">🎓</div>
      <div class="card-title">天权</div>
      <div class="card-subtitle">AI 留学选校助手<br>院校对比 · 文书润色 · 签证指导</div>
      <span class="card-badge">进入 →</span>
    </a>

    <a class="card card-tianshu" href="tianshu/">
      <div class="card-icon">🧭</div>
      <div class="card-title">天枢</div>
      <div class="card-subtitle">学生综合特质测评<br>生涯规划 · 专业推荐 · 发展报告</div>
      <span class="card-badge">进入 →</span>
    </a>
  </div>
</div>
</body>
</html>
