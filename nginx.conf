upstream tianquan_backend {
    server tianquan-backend:3470;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML: never cache (Vite content-hashes JS/CSS, but SPA shell must be fresh)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Landing page
    location = / {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    # 天权 SPA — fallback to its own index.html for client-side routing
    location /tianquan/ {
        try_files $uri $uri/ /tianquan/index.html;
    }

    # 天枢 — static pages
    location /tianshu/ {
        index index.html;
    }

    # Default: landing page or 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://tianquan_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 200s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
