<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霍兰德测试 · 天枢</title>
<script src="beidou.js"></script>
<script src="holland-test.js"></script>
<style>
/* 复用 mbti-test.html 的样式 */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "PingFang SC", "Noto Serif SC", "Microsoft YaHei", Inter, sans-serif;
  line-height: 1.6;
  color: #1a202c;
  background:
    radial-gradient(ellipse at top left, rgba(79, 124, 255, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at top right, rgba(192, 132, 252, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at bottom, rgba(251, 191, 36, 0.05) 0%, transparent 60%),
    linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
  background-attachment: fixed;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 720px;
  margin: 0 auto;
}

header.banner {
  text-align: center;
  padding: 20px 20px 10px;
  margin-bottom: 16px;
}

header.banner .compass {
  margin-bottom: 8px;
  display: flex;
  justify-content: center;
}

header.banner .compass svg {
  filter: drop-shadow(0 0 20px rgba(192, 132, 252, 0.4));
}

header.banner h1 {
  color: #2c5282;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 6px;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #2c5282 0%, #6b46c1 50%, #b7791f 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

header.banner .subtitle {
  color: #718096;
  font-size: 13px;
  letter-spacing: 1px;
}

.mbti-test-card,
.mbti-result-card {
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 18px;
  box-shadow:
    0 4px 24px rgba(44, 82, 130, 0.08),
    0 1px 2px rgba(44, 82, 130, 0.04);
  padding: 36px 44px;
  margin-bottom: 20px;
}

.test-progress {
  height: 4px;
  background: #edf2f7;
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 12px;
}

.test-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4f7cff 0%, #c084fc 50%, #fbbf24 100%);
  transition: width 0.4s ease;
  border-radius: 2px;
}

.test-progress-text {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #718096;
  font-size: 13px;
  margin-bottom: 24px;
}

.dim-tag {
  display: inline-block;
  background: linear-gradient(135deg, #4f7cff 0%, #c084fc 100%);
  color: #fff;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}

.test-question {
  color: #1a202c;
  font-size: 22px;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 28px;
  text-align: center;
}

.test-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.test-option {
  background: #fff;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  padding: 18px 20px;
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  transition: all 0.2s ease;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  min-height: 80px;
}

.test-option:hover {
  border-color: #4f7cff;
  background: #f0f4ff;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(79, 124, 255, 0.15);
}

.test-option.selected {
  border-color: #4f7cff;
  background: linear-gradient(135deg, #ebf4ff 0%, #f3e8ff 100%);
  box-shadow: 0 4px 16px rgba(79, 124, 255, 0.25);
}

.opt-letter {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #4f7cff;
  color: #fff;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
}

.test-option.selected .opt-letter {
  background: linear-gradient(135deg, #4f7cff 0%, #c084fc 100%);
  transform: scale(1.1);
}

.opt-text {
  flex: 1;
  font-size: 14px;
  color: #2d3748;
  line-height: 1.5;
  padding-top: 4px;
}

.test-nav {
  display: flex;
  justify-content: space-between;
  padding-top: 16px;
  border-top: 1px solid #e2e8f0;
}

.test-nav-btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid #cbd5e0;
  background: #fff;
  color: #4a5568;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.test-nav-btn:hover:not(:disabled) {
  background: #f7fafc;
  border-color: #4f7cff;
  color: #4f7cff;
}

.test-nav-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.test-nav-btn.secondary {
  border-color: transparent;
  background: transparent;
  color: #718096;
}

.mbti-result-card {
  text-align: center;
}

.result-emoji {
  font-size: 56px;
  margin-bottom: 12px;
}

.result-title {
  color: #2c5282;
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 14px;
}

.result-type {
  display: inline-block;
  font-size: 48px;
  font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #4f7cff 0%, #c084fc 50%, #fbbf24 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 28px;
  padding: 0 20px;
}

.result-stats {
  text-align: left;
  max-width: 480px;
  margin: 0 auto 16px;
  background: #fafbfc;
  padding: 20px 24px;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
}

.stat-row {
  display: grid;
  grid-template-columns: 100px 1fr 50px;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  font-size: 13px;
}

.stat-row:last-child { margin-bottom: 0; }

.stat-label {
  color: #4a5568;
  font-weight: 500;
}

.stat-bar {
  height: 8px;
  background: #edf2f7;
  border-radius: 4px;
  overflow: hidden;
}

.stat-fill {
  display: block;
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
}

.stat-val {
  color: #1a202c;
  font-weight: 600;
  text-align: right;
}

.result-tip {
  color: #a0aec0;
  font-size: 13px;
  margin-bottom: 24px;
}

.result-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
  max-width: 320px;
  margin: 0 auto;
}

.result-btn {
  width: 100%;
  padding: 14px 24px;
  border-radius: 10px;
  border: none;
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.result-btn.primary {
  background: linear-gradient(135deg, #4f7cff 0%, #6b46c1 100%);
  color: #fff;
  box-shadow: 0 4px 12px rgba(79, 124, 255, 0.3);
}

.result-btn.primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(79, 124, 255, 0.45);
}

.result-btn.secondary {
  background: #fff;
  color: #4a5568;
  border: 1px solid #cbd5e0;
}

.result-btn.secondary:hover {
  background: #f7fafc;
  border-color: #a0aec0;
}

footer.footer {
  margin-top: 30px;
  text-align: center;
  color: #a0aec0;
  font-size: 12px;
}

@media (max-width: 640px) {
  .test-options { grid-template-columns: 1fr; }
  .mbti-test-card, .mbti-result-card { padding: 24px 18px; }
  .test-question { font-size: 18px; }
  .stat-row { grid-template-columns: 80px 1fr 40px; gap: 8px; }
}
</style>
</head>
<body>

<div class="container">

<header class="banner">
  <div class="compass" id="beidou-container"></div>
  <h1>天枢</h1>
  <div class="subtitle">霍兰德职业兴趣测试 · 完整版 60 题</div>
</header>

<div id="holland-test-app"></div>

<footer class="footer">
  本测试基于霍兰德 SDS(Self-Directed Search)量表改编,仅用于生涯规划参考。正式测评请咨询专业机构。
</footer>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const beidouEl = document.getElementById("beidou-container");
  if (beidouEl) {
    beidouEl.innerHTML = window.TianShuBeidou.renderBeidouSvg({ size: 90, theme: "purple" });
  }
  window.TianShuHollandTest.start();
});
</script>

</body>
</html>
