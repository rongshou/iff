<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天枢 · 学生综合特质测评与生涯规划工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="version.js"></script>
<script src="bazi.js"></script>
<script src="data.js"></script>
<script src="engine.js"></script>
<script src="beidou.js"></script>
<script src="app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "PingFang SC", "Noto Serif SC", "Microsoft YaHei", "Inter", "Helvetica Neue", Arial, sans-serif;
  line-height: 1.6;
  color: #1a202c;
  background:
    radial-gradient(ellipse at top left, rgba(79, 124, 255, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at top right, rgba(192, 132, 252, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at bottom, rgba(251, 191, 36, 0.05) 0%, transparent 60%),
    linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
  background-attachment: fixed;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 960px;
  margin: 0 auto;
}

/* ===== 顶部导航（天权风格） ===== */
.top-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  margin-bottom: 24px;
}

.top-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.top-header-accent {
  display: inline-block;
  width: 4px;
  height: 20px;
  border-radius: 999px;
  background: linear-gradient(180deg, #8b5cf6 0%, #a855f7 100%);
  flex-shrink: 0;
}

.top-header-left h1 {
  font-size: 16px;
  font-weight: 700;
  color: #1e293b;
}

@media (min-width: 640px) {
  .top-header-left h1 { font-size: 18px; }
}

.top-header-left .sep {
  color: #cbd5e1;
}

.top-header-left .subtitle {
  color: #64748b;
  font-size: 14px;
}

.top-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.nav-switch {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  color: #94a3b8;
  border: 1px solid #e2e8f0;
  background: transparent;
  text-decoration: none;
  transition: all 0.2s;
}
.nav-switch:hover {
  color: #4f46e5;
  border-color: #a5b4fc;
  background: #eef2ff;
}

/* ===== 进度条 ===== */
.progress-bar {
  background: #fff;
  border-radius: 14px;
  padding: 24px 30px 22px;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
  position: relative;
  overflow: hidden;
}

.progress-bar::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #4f7cff 0%, #c084fc 50%, #fbbf24 100%);
  opacity: 0.6;
}

.progress-track {
  position: absolute;
  top: 38px;
  left: 60px;
  right: 60px;
  height: 3px;
  background: #edf2f7;
  border-radius: 2px;
  z-index: 0;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #4f7cff 0%, #c084fc 50%, #fbbf24 100%);
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.progress-fill::after {
  content: "";
  position: absolute;
  right: -2px;
  top: -3px;
  width: 9px;
  height: 9px;
  background: #fbbf24;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(251, 191, 36, 0.6);
}

.progress-steps {
  list-style: none;
  display: flex;
  justify-content: space-between;
  position: relative;
  z-index: 1;
  margin: 0;
  padding: 0;
}

.progress-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  background: #fff;
  padding: 0 4px;
  min-width: 60px;
}

.step-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid #cbd5e0;
  color: #a0aec0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.3s ease;
}

.step-label {
  font-size: 12px;
  color: #a0aec0;
  font-weight: 500;
  transition: color 0.3s;
}

.progress-step.active .step-dot {
  background: linear-gradient(135deg, #4f7cff 0%, #c084fc 100%);
  border-color: transparent;
  color: #fff;
  box-shadow: 0 0 0 4px rgba(79, 124, 255, 0.15);
  transform: scale(1.05);
}

.progress-step.active .step-label {
  color: #2c5282;
  font-weight: 600;
}

.progress-step.completed .step-dot {
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  border-color: transparent;
  color: #fff;
}

.progress-step.completed .step-label {
  color: #10b981;
}

/* Step Card */
.step-card {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 16px;
  box-shadow:
    0 4px 24px rgba(44, 82, 130, 0.08),
    0 1px 2px rgba(44, 82, 130, 0.04);
  padding: 40px 50px;
  margin-bottom: 20px;
  transition: box-shadow 0.3s ease;
}

.step-card:hover {
  box-shadow:
    0 8px 32px rgba(44, 82, 130, 0.12),
    0 2px 4px rgba(44, 82, 130, 0.06);
}

.step-header {
  display: flex;
  align-items: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid #e2e8f0;
}

.step-num {
  display: inline-block;
  background: #2c5282;
  color: #fff;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 20px;
  margin-right: 14px;
  font-size: 14px;
}

.step-header h2 {
  color: #2c5282;
  font-size: 20px;
}

/* Forms */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}

.form-grid label {
  display: flex;
  flex-direction: column;
  font-size: 14px;
  color: #4a5568;
  font-weight: 500;
}

.form-grid input,
.form-grid select {
  margin-top: 6px;
  padding: 11px 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.2s;
  background: #fff;
}

.form-grid input:focus,
.form-grid select:focus {
  outline: none;
  border-color: #4f7cff;
  box-shadow: 0 0 0 4px rgba(79, 124, 255, 0.12);
  background: #fff;
}

.form-grid input:hover,
.form-grid select:hover {
  border-color: #cbd5e0;
}

.hint {
  color: #718096;
  font-size: 14px;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: #f7fafc;
  border-radius: 6px;
}

/* Buttons */
.step-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid #e2e8f0;
}

.btn-primary,
.btn-secondary,
.btn-text {
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  border: none;
  transition: all 0.2s ease;
  letter-spacing: 0.5px;
}

.btn-primary {
  background: linear-gradient(135deg, #4f7cff 0%, #6b46c1 100%);
  color: #fff;
  box-shadow: 0 4px 12px rgba(79, 124, 255, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(79, 124, 255, 0.45);
  background: linear-gradient(135deg, #6090ff 0%, #7c52d1 100%);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-secondary {
  background: #fff;
  color: #4a5568;
  border: 1px solid #cbd5e0;
}

.btn-secondary:hover {
  background: #f7fafc;
  border-color: #a0aec0;
  transform: translateY(-1px);
}

.btn-text {
  background: transparent;
  color: #4f7cff;
  font-size: 14px;
  padding: 6px 10px;
}

.btn-text:hover {
  background: #ebf8ff;
}

/* Tables */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 14px;
}

.data-table th,
.data-table td {
  border: 1px solid #e2e8f0;
  padding: 10px 14px;
  text-align: left;
}

.data-table th {
  background: #2c5282;
  color: #fff;
  font-weight: 600;
}

.data-table tr:nth-child(even) {
  background: #f7fafc;
}

/* Tags */
.tag {
  display: inline-block;
  background: #edf2f7;
  color: #2d3748;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  margin: 0 4px;
}

.tag-primary {
  background: #2c5282;
  color: #fff;
}

.tag-warning {
  background: #fef5e7;
  color: #c05621;
}

.tag-danger {
  background: #fed7d7;
  color: #c53030;
}

/* Info blocks */
.info-block {
  background: #ebf8ff;
  border-left: 4px solid #3182ce;
  padding: 14px 18px;
  margin: 14px 0;
  border-radius: 4px;
  font-size: 14px;
  line-height: 1.7;
}

.callout {
  background: linear-gradient(135deg, #ebf8ff 0%, #f3e8ff 100%);
  border-left: 4px solid #4f7cff;
  padding: 20px 24px;
  margin: 18px 0;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(79, 124, 255, 0.08);
}

.callout-title {
  color: #2c5282;
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 16px;
}

.note {
  color: #718096;
  font-size: 12px;
  margin-top: 10px;
  font-style: italic;
}

/* 紫微宫位 */
.gong-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
  margin: 14px 0;
}

.gong-card {
  background: #fafbfc;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  padding: 14px 16px;
}

.gong-title {
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 8px;
  font-size: 14px;
}

.hour-effect {
  margin-top: 6px;
  font-size: 12px;
  color: #c05621;
}

/* MBTI card */
.mbti-card {
  background: linear-gradient(135deg, #f7fafc 0%, #ebf8ff 100%);
  border: 1px solid #cbd5e0;
  border-radius: 8px;
  padding: 18px 22px;
  margin: 16px 0;
}

.mbti-title {
  font-size: 16px;
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 10px;
}

/* 滑块 */
.sliders {
  margin: 14px 0;
}

.slider-row {
  display: grid;
  grid-template-columns: 1fr 2fr auto;
  align-items: center;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid #edf2f7;
}

.slider-label {
  font-size: 12px;
  color: #4a5568;
}

.slider-value {
  display: inline-block;
  background: #2c5282;
  color: #fff;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  margin-left: 8px;
  min-width: 36px;
  text-align: center;
}

.slider-row input[type="range"] {
  width: 100%;
}

/* Holland card */
.holland-card {
  background: linear-gradient(135deg, #f0fff4 0%, #ebf8ff 100%);
  border: 1px solid #9ae6b4;
  border-radius: 8px;
  padding: 18px 22px;
  margin: 16px 0;
}

.holland-title {
  font-size: 16px;
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 8px;
}

.holland-fits {
  margin-top: 10px;
  font-size: 14px;
}

.holland-fits ul {
  margin-left: 22px;
  margin-top: 4px;
}

.risk-warning {
  margin-top: 10px;
  padding: 8px 12px;
  background: #fef5e7;
  border-left: 3px solid #ed8936;
  border-radius: 4px;
  font-size: 12px;
  color: #c05621;
}

/* ===== Unified Report Styles ===== */
/* Typography scale: 18px (section) → 16px (subsection/card) → 14px (body) → 13px (meta) */

.report h2 {
  font-size: 18px;
  font-weight: 700;
  color: #1a202c;
  margin: 36px 0 16px 0;
  padding-bottom: 10px;
  border-bottom: 2px solid #4f7cff;
  letter-spacing: 0.5px;
}

.report h2:first-of-type {
  margin-top: 0;
  font-size: 18px;
}

.report h3 {
  font-size: 16px;
  font-weight: 600;
  color: #2c5282;
  margin: 20px 0 10px 0;
}

.report h4 {
  font-size: 14px;
  font-weight: 600;
  color: #4a5568;
  margin: 14px 0 6px 0;
}

.report p {
  font-size: 14px;
  line-height: 1.8;
  color: #2d3748;
  margin: 8px 0;
}

.report ul,
.report ol {
  margin: 6px 0 6px 20px;
  font-size: 14px;
  line-height: 1.8;
}

.report li {
  margin: 4px 0;
}

/* ---- Base Card ---- */
.report .card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 18px 22px;
  margin: 12px 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  line-height: 1.7;
}

/* ---- Report Header ---- */
.report-header {
  text-align: center;
  padding: 28px 24px;
  margin-bottom: 24px;
  background: linear-gradient(135deg, #1a365d 0%, #2c5282 50%);
  border-radius: 14px;
  color: #fff;
}

.report-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.report-tags { margin: 10px 0; }

.report-tags .tag {
  font-size: 13px;
  padding: 4px 12px;
  margin: 0 3px;
}

.report-quote {
  font-size: 14px;
  font-style: italic;
  opacity: 0.9;
  padding: 10px 16px;
  border-top: 1px solid rgba(255,255,255,0.15);
  margin-top: 10px;
  line-height: 1.7;
}

/* ---- Section Description ---- */
.report-desc {
  color: #4a5568;
  font-size: 14px;
  margin-bottom: 14px;
  line-height: 1.7;
}

/* ---- Data Table ---- */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 14px;
}
.data-table th,
.data-table td {
  border: 1px solid #e2e8f0;
  padding: 10px 14px;
  text-align: left;
}
.data-table th {
  background: #2c5282;
  color: #fff;
  font-weight: 600;
}
.data-table tr:nth-child(even) { background: #f7fafc; }

/* ---- Info Block ---- */
.info-block {
  background: #f7fafc;
  border-left: 3px solid #4f7cff;
  padding: 12px 16px;
  margin: 12px 0;
  border-radius: 4px;
  font-size: 14px;
  line-height: 1.8;
}

/* ---- Callout ---- */
.callout {
  background: #f7fafc;
  border-left: 3px solid #4f7cff;
  padding: 16px 20px;
  margin: 16px 0;
  border-radius: 8px;
}
.callout-title {
  font-size: 16px;
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 6px;
}

/* ---- Note ---- */
.note {
  color: #718096;
  font-size: 13px;
  margin-top: 8px;
  font-style: italic;
}

/* ---- Tags ---- */
.tag {
  display: inline-block;
  background: #edf2f7;
  color: #2d3748;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 13px;
  margin: 0 3px;
}
.tag-primary { background: #2c5282; color: #fff; }
.tag-warning { background: #fef5e7; color: #c05621; }

/* ---- 紫微 ---- */
.gong-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
  margin: 12px 0;
}
.gong-card {
  background: #f7fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 14px;
}
.gong-title {
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 6px;
}
.hour-effect {
  margin-top: 6px;
  font-size: 13px;
  color: #c05621;
}

/* ---- Cross Grid (MBTI + Holland) ---- */
.cross-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 14px 0;
}
.cross-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 16px 18px;
}
.cross-card-title {
  font-size: 16px;
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 2px;
}
.cross-card-sub {
  color: #4f7cff;
  font-size: 14px;
  margin-bottom: 8px;
}
.cross-card-detail {
  font-size: 13px;
  color: #4a5568;
  margin-top: 4px;
}

/* ---- MBTI Card ---- */
.mbti-card {
  background: #f7fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 16px 20px;
  margin: 14px 0;
}
.mbti-title {
  font-size: 16px;
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 8px;
}

/* ---- Holland Card ---- */
.holland-card {
  background: #f7fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 16px 20px;
  margin: 14px 0;
}
.holland-title {
  font-size: 16px;
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 6px;
}
.holland-fits { margin-top: 8px; font-size: 14px; }
.holland-fits ul { margin-left: 20px; margin-top: 4px; }
.risk-warning {
  margin-top: 8px;
  padding: 8px 12px;
  background: #fef5e7;
  border-left: 3px solid #ed8936;
  border-radius: 4px;
  font-size: 13px;
  color: #c05621;
}

/* ---- Astro Card ---- */
.astro-card {
  display: flex;
  align-items: center;
  gap: 14px;
  background: #f7fafc;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 16px 20px;
  margin: 12px 0;
}
.astro-symbol {
  font-size: 24px;
  line-height: 1;
  min-width: 44px;
  text-align: center;
}
.astro-name {
  font-size: 16px;
  font-weight: 600;
  color: #2c5282;
}
.astro-meta {
  font-size: 13px;
  color: #718096;
  margin-top: 2px;
}

/* ---- Major / Grad Cards ---- */
.major-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 16px 20px;
  margin: 10px 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.major-title {
  font-size: 16px;
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 4px;
}
.major-meta {
  color: #718096;
  font-size: 13px;
  margin-bottom: 8px;
}
.major-card-mini {
  background: #f7fafc;
  padding: 10px 14px;
  border-radius: 6px;
  margin: 6px 0;
  font-size: 14px;
}

/* ---- Risk Card ---- */
.risk-card {
  background: #fff5f5;
  border-left: 3px solid #e53e3e;
  padding: 12px 16px;
  margin: 8px 0;
  border-radius: 6px;
  font-size: 14px;
}

/* ---- Career Stage ---- */
.career-stage {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 20px 24px;
  margin: 14px 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.stage-title {
  font-size: 16px;
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #edf2f7;
}
.path-item {
  background: #f7fafc;
  padding: 10px 14px;
  border-radius: 6px;
  margin: 6px 0;
  font-size: 14px;
}

/* ---- Timeline ---- */
.timeline {
  position: relative;
  margin: 18px 0;
  padding-left: 36px;
}
.timeline::before {
  content: "";
  position: absolute;
  left: 14px;
