<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天枢 · 学生综合特质测评与生涯规划工具</title>
<script src="bazi.js"></script>
<script src="data.js"></script>
<script src="engine.js"></script>
<script src="app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  line-height: 1.6;
  color: #2c3e50;
  background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 960px;
  margin: 0 auto;
}

header.banner {
  text-align: center;
  padding: 30px 20px;
  margin-bottom: 30px;
}

header.banner h1 {
  color: #2c5282;
  font-size: 32px;
  letter-spacing: 4px;
  margin-bottom: 8px;
}

header.banner .subtitle {
  color: #718096;
  font-size: 14px;
}

header.banner .compass {
  font-size: 48px;
  margin-bottom: 8px;
}

/* Step Card */
.step-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  padding: 40px 50px;
  margin-bottom: 20px;
}

.step-header {
  display: flex;
  align-items: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid #e2e8f0;
}

.step-num {
  display: inline-block;
  background: #2c5282;
  color: #fff;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 20px;
  margin-right: 14px;
  font-size: 14px;
}

.step-header h2 {
  color: #2c5282;
  font-size: 22px;
}

/* Forms */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}

.form-grid label {
  display: flex;
  flex-direction: column;
  font-size: 14px;
  color: #4a5568;
  font-weight: 500;
}

.form-grid input,
.form-grid select {
  margin-top: 6px;
  padding: 10px 12px;
  border: 1px solid #cbd5e0;
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.2s;
}

.form-grid input:focus,
.form-grid select:focus {
  outline: none;
  border-color: #2c5282;
  box-shadow: 0 0 0 3px rgba(44,82,130,0.1);
}

.hint {
  color: #718096;
  font-size: 14px;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: #f7fafc;
  border-radius: 6px;
}

/* Buttons */
.step-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid #e2e8f0;
}

.btn-primary,
.btn-secondary,
.btn-text {
  padding: 11px 22px;
  border-radius: 6px;
  font-size: 15px;
  cursor: pointer;
  font-family: inherit;
  border: none;
  transition: all 0.2s;
}

.btn-primary {
  background: #2c5282;
  color: #fff;
  font-weight: 500;
}

.btn-primary:hover {
  background: #1a365d;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(44,82,130,0.3);
}

.btn-secondary {
  background: #edf2f7;
  color: #4a5568;
}

.btn-secondary:hover {
  background: #e2e8f0;
}

.btn-text {
  background: transparent;
  color: #2c5282;
  font-size: 14px;
  padding: 6px 10px;
}

.btn-text:hover {
  background: #ebf8ff;
}

/* Tables */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 14px;
}

.data-table th,
.data-table td {
  border: 1px solid #e2e8f0;
  padding: 10px 14px;
  text-align: left;
}

.data-table th {
  background: #2c5282;
  color: #fff;
  font-weight: 600;
}

.data-table tr:nth-child(even) {
  background: #f7fafc;
}

/* Tags */
.tag {
  display: inline-block;
  background: #edf2f7;
  color: #2d3748;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 13px;
  margin: 0 4px;
}

.tag-primary {
  background: #2c5282;
  color: #fff;
}

.tag-warning {
  background: #fef5e7;
  color: #c05621;
}

.tag-danger {
  background: #fed7d7;
  color: #c53030;
}

/* Info blocks */
.info-block {
  background: #ebf8ff;
  border-left: 4px solid #3182ce;
  padding: 14px 18px;
  margin: 14px 0;
  border-radius: 4px;
  font-size: 14px;
  line-height: 1.7;
}

.callout {
  background: #ebf8ff;
  border-left: 4px solid #3182ce;
  padding: 16px 22px;
  margin: 16px 0;
  border-radius: 4px;
}

.callout-title {
  color: #2c5282;
  font-weight: 600;
  margin-bottom: 6px;
  font-size: 16px;
}

.note {
  color: #718096;
  font-size: 13px;
  margin-top: 10px;
  font-style: italic;
}

/* 紫微宫位 */
.gong-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
  margin: 14px 0;
}

.gong-card {
  background: #fafbfc;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  padding: 14px 16px;
}

.gong-title {
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 8px;
  font-size: 15px;
}

.hour-effect {
  margin-top: 6px;
  font-size: 12px;
  color: #c05621;
}

/* MBTI card */
.mbti-card {
  background: linear-gradient(135deg, #f7fafc 0%, #ebf8ff 100%);
  border: 1px solid #cbd5e0;
  border-radius: 8px;
  padding: 18px 22px;
  margin: 16px 0;
}

.mbti-title {
  font-size: 18px;
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 10px;
}

/* 滑块 */
.sliders {
  margin: 14px 0;
}

.slider-row {
  display: grid;
  grid-template-columns: 1fr 2fr auto;
  align-items: center;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid #edf2f7;
}

.slider-label {
  font-size: 13px;
  color: #4a5568;
}

.slider-value {
  display: inline-block;
  background: #2c5282;
  color: #fff;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 13px;
  margin-left: 8px;
  min-width: 36px;
  text-align: center;
}

.slider-row input[type="range"] {
  width: 100%;
}

/* Holland card */
.holland-card {
  background: linear-gradient(135deg, #f0fff4 0%, #ebf8ff 100%);
  border: 1px solid #9ae6b4;
  border-radius: 8px;
  padding: 18px 22px;
  margin: 16px 0;
}

.holland-title {
  font-size: 17px;
  font-weight: 600;
  color: #2c5282;
  margin-bottom: 8px;
}

.holland-fits {
  margin-top: 10px;
  font-size: 14px;
}

.holland-fits ul {
  margin-left: 22px;
  margin-top: 4px;
}

.risk-warning {
  margin-top: 10px;
  padding: 8px 12px;
  background: #fef5e7;
  border-left: 3px solid #ed8936;
  border-radius: 4px;
  font-size: 13px;
  color: #c05621;
}

/* Report */
.report h2 {
  color: #2c5282;
  font-size: 22px;
  margin: 32px 0 16px 0;
  padding-bottom: 8px;
  border-bottom: 2px solid #e2e8f0;
}

.report h3 {
  color: #4a5568;
  font-size: 16px;
  margin: 18px 0 10px 0;
  font-weight: 600;
}

.report h4 {
  color: #718096;
  font-size: 14px;
  margin: 12px 0 8px 0;
  font-weight: 600;
}

.report ul,
.report ol {
  margin: 8px 0 8px 24px;
}

.report li {
  margin: 5px 0;
  font-size: 14px;
}

.major-card {
  border: 1px solid #cbd5e0;
  border-radius: 8px;
  padding: 16px 20px;
  margin: 12px 0;
  background: #fafbfc;
}

.major-title {
  color: #2c5282;
  font-weight: 600;
  font-size: 17px;
  margin-bottom: 6px;
}

.major-meta {
  color: #718096;
  font-size: 13px;
  margin-bottom: 10px;
}

.major-card-mini {
  background: #f7fafc;
  padding: 10px 14px;
  border-radius: 4px;
  margin: 6px 0;
  font-size: 14px;
}

.risk-card {
  background: #fff5f5;
  border-left: 4px solid #e53e3e;
  padding: 12px 18px;
  margin: 10px 0;
  border-radius: 4px;
  font-size: 14px;
}

.career-stage {
  border: 1px solid #cbd5e0;
  border-radius: 8px;
  padding: 20px 24px;
  margin: 14px 0;
  background: #fff;
}

.stage-title {
  color: #2c5282;
  font-weight: 600;
  font-size: 17px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #e2e8f0;
}

.path-item {
  background: #f7fafc;
  padding: 10px 14px;
  border-radius: 4px;
  margin: 8px 0;
  font-size: 14px;
}

.risk-list li {
  color: #c53030;
}

.disclaimer {
  margin-top: 40px;
  padding: 18px 22px;
  background: #fffaf0;
  border-left: 4px solid #ed8936;
  border-radius: 4px;
  font-size: 13px;
  color: #744210;
  line-height: 1.7;
}

.footer {
  margin-top: 30px;
  padding-top: 18px;
  border-top: 1px solid #e2e8f0;
  color: #a0aec0;
  font-size: 12px;
  text-align: center;
}

.loading {
  text-align: center;
  padding: 60px 20px;
  color: #2c5282;
  font-size: 18px;
}

.error {
  background: #fff5f5;
  border-left: 4px solid #e53e3e;
  padding: 16px 20px;
  border-radius: 4px;
  color: #c53030;
}

@media (max-width: 640px) {
  .step-card { padding: 25px 20px; }
  .slider-row { grid-template-columns: 1fr; }
  header.banner h1 { font-size: 26px; }
}

@media print {
  body { background: #fff; padding: 0; }
  header.banner, .step-header, .step-actions, .form-grid, .hint, .sliders, .btn-text { display: none; }
  .step-card { box-shadow: none; padding: 0; }
  .report h2 { page-break-before: always; }
  .report h2:first-child { page-break-before: avoid; }
}
</style>
</head>
<body>

<div class="container">

<header class="banner">
  <div class="compass">🧭</div>
  <h1>天枢</h1>
  <div class="subtitle">学生综合特质测评与生涯规划工具 · v0.1 (Web 版)</div>
  <div class="subtitle" style="margin-top:6px;">基于八字 + 紫微 + MBTI + 霍兰德四维交叉</div>
</header>

<div id="app">
  <div class="loading">加载中...</div>
</div>

</div>

</body>
</html>
